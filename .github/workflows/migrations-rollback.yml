name: Migrations Rollback Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rollback-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mentorminds_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U postgres && break || sleep 2;
          done

      - name: Run migrations up and rollback test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/mentorminds_test
        run: |
          npm run migrate:generate-down
          npm run migrate:up
          node ./scripts/run-rollbacks.js
