# ZAP API Scan Configuration
# This file configures OWASP ZAP API security scanning

# API Definition
# Point to OpenAPI/Swagger specification
api_spec=/workspace/openapi.json

# Target URL
target_url=http://localhost:3000

# Authentication
# Configure authentication for protected endpoints
auth_method=bearer
auth_token_endpoint=http://localhost:3000/api/auth/login
auth_token_request_body={"email":"test@example.com","password":"TestPassword123!"}
auth_token_response_path=data.accessToken

# Scan Policy
# Use API scan policy for comprehensive testing
scan_policy=API-scan

# Alert Thresholds
# FAIL: High and Medium alerts
# WARN: Low alerts
# IGNORE: Informational alerts
fail_on_high=true
fail_on_medium=true
warn_on_low=true

# Ignore Rules (same as baseline)
# Format: alert_id	url_regex	parameter	cwe_id	wascid

# Ignore timestamp disclosures in API responses
10096	http://localhost:3000/api/.*	timestamp	.*	.*
10096	http://localhost:3000/api/.*	createdAt	.*	.*
10096	http://localhost:3000/api/.*	updatedAt	.*	.*

# Ignore health check endpoint
10096	http://localhost:3000/api/health	.*	.*	.*

# Ignore development environment warnings
90022	http://localhost:3000/api/.*	.*	.*	.*
