# ZAP Baseline Scan Configuration
# This file configures OWASP ZAP baseline security scanning

# Ignore specific alerts that are false positives or acceptable risks
# Format: alert_id	url_regex	parameter	cwe_id	wascid

# Example: Ignore specific false positives
# 10021	http://localhost:3000/api/health	.*	.*	.*

# Alert IDs:
# 10021 - X-Content-Type-Options Header Missing
# 10020 - X-Frame-Options Header Not Set
# 10016 - Web Browser XSS Protection Not Enabled
# 10017 - Cross-Domain JavaScript Source File Inclusion
# 10019 - Content-Type Header Missing
# 10027 - Information Disclosure - Suspicious Comments
# 10054 - Cookie Without SameSite Attribute
# 10055 - CSP Header Not Set
# 10056 - X-Debug-Token Information Leak
# 10096 - Timestamp Disclosure
# 10098 - Cross-Domain Misconfiguration
# 90001 - Insecure JSF ViewState
# 90022 - Application Error Disclosure
# 90033 - Loosely Scoped Cookie

# Ignore health check endpoint for some checks
10096	http://localhost:3000/api/health	.*	.*	.*

# Ignore timestamp in API responses (expected behavior)
10096	http://localhost:3000/api/.*	timestamp	.*	.*
10096	http://localhost:3000/api/.*	createdAt	.*	.*
10096	http://localhost:3000/api/.*	updatedAt	.*	.*

# Ignore development/test environment warnings
90022	http://localhost:3000/api/.*	.*	.*	.*
