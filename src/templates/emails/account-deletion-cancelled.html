<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Deletion Cancelled</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f4f4;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 20px;">
        <h2 style="color: #4A90E2;">Account Deletion Cancelled</h2>
        <p>Hi {{userName}},</p>
        <p>Your account deletion request has been cancelled. Your MentorMinds account remains active.</p>
        <p style="color: #666; font-size: 14px;">
            If you did not cancel this request, contact us at <a href="{{supportUrl}}">{{supportUrl}}</a>.
        </p>
    </div>
</body>
</html>
