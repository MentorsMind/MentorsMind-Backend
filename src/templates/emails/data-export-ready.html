<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data Export Ready</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f4f4;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 20px;">
        <h2 style="color: #4A90E2;">Your data export is ready</h2>
        <p>Hi {{userName}},</p>
        <p>Your MentorMinds data export has been generated. Use the link below to download your ZIP archive.</p>
        <p style="text-align: center; margin: 24px 0;">
            <a href="{{downloadUrl}}" style="background-color: #4A90E2; color: #fff; padding: 12px 24px; text-decoration: none; border-radius: 6px;">
                Download export
            </a>
        </p>
        <p style="color: #666; font-size: 14px;">This link expires on {{expiresAt}}.</p>
    </div>
</body>
</html>
