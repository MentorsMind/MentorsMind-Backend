# Horizontal Pod Autoscaler — scales mentorminds-api pods based on CPU,
# memory, and custom queue-depth metric.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mentorminds-api
  namespace: default
  labels:
    app: mentorminds-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mentorminds-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: External
      external:
        metric:
          name: queue_depth
        target:
          type: AverageValue
          averageValue: "100"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
      selectPolicy: Min

---
# Vertical Pod Autoscaler — right-sizes CPU/memory requests and limits
# for mentorminds-api pods automatically.
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: mentorminds-api-vpa
  namespace: default
  labels:
    app: mentorminds-api
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mentorminds-api
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: mentorminds-api
        minAllowed:
          cpu: "100m"
          memory: "128Mi"
        maxAllowed:
          cpu: "2"
          memory: "2Gi"
        controlledResources:
          - cpu
          - memory
        controlledValues: RequestsAndLimits
